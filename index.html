<!-- ============================================================
     MAKE MY MANDIR — SILENT EMAIL CAPTURE
     When client clicks "Continue on WhatsApp", this script fires
     an email to info@makemymandir.com in the background silently.
     Client does NOT need to do anything extra.
     Uses Formsubmit.co — zero signup, just a one-time activation.
     FIRST SUBMISSION: Check info@makemymandir.com for activation
     email from formsubmit.co and click "Activate Form" link once.
     After that, ALL leads arrive automatically, forever.
============================================================ -->
<script>
(function(){
  // ── CONFIG ──────────────────────────────────────────────────
  var NOTIFY_EMAIL   = "info@makemymandir.com";
  var FORMSUBMIT_URL = "https://formsubmit.co/ajax/" + NOTIFY_EMAIL;
  // ────────────────────────────────────────────────────────────

  var sentIds = new Set();

  /* ── Toast notification (visible to client) ── */
  function showToast(msg, success){
    var t = document.createElement("div");
    t.textContent = msg;
    t.style.cssText = [
      "position:fixed;top:20px;left:50%;",
      "transform:translateX(-50%);",
      "background:" + (success ? "#047857" : "#B45309") + ";",
      "color:white;padding:14px 22px;border-radius:12px;",
      "font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;",
      "z-index:99999;box-shadow:0 8px 24px rgba(0,0,0,0.18);",
      "animation:mmmSlideDown 0.3s ease-out;white-space:nowrap;"
    ].join("");
    document.body.appendChild(t);
    setTimeout(function(){
      t.style.opacity = "0";
      t.style.transition = "opacity 0.4s";
      setTimeout(function(){ t.remove(); }, 450);
    }, 3800);
  }

  /* ── Extract WhatsApp pre-filled brief from href ── */
  function extractBrief(href){
    try {
      return decodeURIComponent(new URL(href).searchParams.get("text") || "");
    } catch(e){ return ""; }
  }

  /* ── Parse structured fields out of the brief text ── */
  function parseFields(brief){
    var F = {};
    var P = {
      Name:       /Name:\s*([^\n]+)/,
      WhatsApp:   /WhatsApp:\s*\+91\s*([^\n]+)/,
      Email:      /Email:\s*([^\n]+)/,
      City:       /City:\s*([^\n]+)/,
      Deities:    /Deities:\s*([^\n]+)/,
      Rituals:    /Rituals:\s*([^\n]+)/,
      Location:   /Location:\s*([^\n]+)/,
      Vastu:      /Vastu:\s*([^\n]+)/,
      Framework:  /Framework:\s*([^\n]+)/,
      Dimensions: /Dimensions:\s*([^\n]+)/,
      Style:      /Style:\s*([^\n]+)/,
      Material:   /Material:\s*([^\n]+)/,
      Features:   /Features:\s*([^\n]+)/,
      Budget:     /Budget:\s*([^\n]+)/,
      Timeline:   /Timeline:\s*([^\n]+)/
    };
    for (var k in P){
      var m = brief.match(P[k]);
      F[k] = m ? m[1].trim() : "";
    }
    return F;
  }

  /* ── Build a clean HTML email body ── */
  function buildEmailHTML(fields, rawBrief){
    var rows = [
      ["Name",       fields.Name],
      ["WhatsApp",   "+91 " + fields.WhatsApp],
      ["Email",      fields.Email || "—"],
      ["City",       fields.City],
      ["Deities",    fields.Deities],
      ["Rituals",    fields.Rituals],
      ["Location",   fields.Location],
      ["Vastu",      fields.Vastu],
      ["Framework",  fields.Framework],
      ["Dimensions", fields.Dimensions],
      ["Style",      fields.Style],
      ["Material",   fields.Material],
      ["Features",   fields.Features || "—"],
      ["Budget",     fields.Budget],
      ["Timeline",   fields.Timeline],
    ];
    var tableRows = rows.map(function(r){
      return "<tr><td style='padding:7px 12px;background:#FFF8F0;font-size:12px;color:#78716C;white-space:nowrap;border-bottom:1px solid #F5E7D3;'><strong>" + r[0] + "</strong></td>"
           + "<td style='padding:7px 12px;font-size:13px;color:#1C0A00;border-bottom:1px solid #F5E7D3;'>" + (r[1]||"—") + "</td></tr>";
    }).join("");

    return [
      "<div style='font-family:Georgia,serif;max-width:600px;margin:0 auto;'>",
      "<div style='background:#E87826;padding:18px 24px;border-radius:12px 12px 0 0;'>",
      "<h2 style='margin:0;color:white;font-size:20px;letter-spacing:-0.5px;'>",
      "🪔 New Mandir Lead — " + (fields.Name||"Unknown") + " from " + (fields.City||"Unknown"),
      "</h2>",
      "<p style='margin:4px 0 0;color:rgba(255,255,255,0.85);font-size:12px;'>",
      "Submitted via Configurator · " + new Date().toLocaleString("en-IN",{timeZone:"Asia/Kolkata"}),
      "</p>",
      "</div>",
      "<table style='width:100%;border-collapse:collapse;background:#FFFBF5;border:1px solid #F5E7D3;border-top:none;'>",
      tableRows,
      "</table>",
      "<div style='padding:14px 16px;background:#FFF1E3;border:1px solid #F5E7D3;border-top:none;border-radius:0 0 12px 12px;'>",
      "<p style='margin:0;font-size:12px;color:#78716C;'><strong>Full Brief:</strong><br>",
      "<pre style='font-family:sans-serif;font-size:11.5px;color:#57534E;white-space:pre-wrap;margin:6px 0 0;'>"+rawBrief+"</pre>",
      "</p></div></div>"
    ].join("");
  }

  /* ── Send email via Formsubmit.co AJAX endpoint ── */
  function sendLeadEmail(brief, fields){
    var subject = "\uD83E\uDE94 New Mandir Lead: " + (fields.Name||"Unknown") + " \u2022 " + (fields.City||"") + " \u2022 " + (fields.Framework||"") + " \u2022 " + (fields.Budget||"");

    var payload = {
      _subject:     subject,
      _template:    "table",
      _captcha:     "false",
      _autoresponse: "false",
      Name:         fields.Name        || "",
      WhatsApp:     "+91 " + fields.WhatsApp,
      Email:        fields.Email       || "(not provided)",
      City:         fields.City        || "",
      Deities:      fields.Deities     || "",
      Rituals:      fields.Rituals     || "",
      Location:     fields.Location    || "",
      Vastu:        fields.Vastu       || "",
      Framework:    fields.Framework   || "",
      Dimensions:   fields.Dimensions  || "",
      Style:        fields.Style       || "",
      Material:     fields.Material    || "",
      Features:     fields.Features    || "",
      Budget:       fields.Budget      || "",
      Timeline:     fields.Timeline    || "",
      Source:       "Website Configurator",
      Submitted_At: new Date().toLocaleString("en-IN",{timeZone:"Asia/Kolkata"}),
      Full_Brief:   brief
    };

    return fetch(FORMSUBMIT_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Accept": "application/json" },
      body: JSON.stringify(payload)
    })
    .then(function(r){ return r.json(); })
    .then(function(data){
      if (data && data.success){
        console.log("[MMM] Lead email sent ✓");
        return true;
      }
      console.warn("[MMM] Lead email failed:", data);
      return false;
    })
    .catch(function(err){
      console.error("[MMM] Lead email error:", err);
      return false;
    });
  }

  /* ── Click interceptor — fires email on "Submit to Team" button click ── */
  document.addEventListener("click", function(e){
    // Find the closest button ancestor
    var btn = e.target.closest && e.target.closest("button");
    if (!btn) return;

    // Only act on the "Submit to Team" button
    var txt = (btn.textContent || btn.innerText || "").trim();
    if (txt.indexOf("Submit to Team") === -1) return;

    // React will now re-render to step 14 (success screen with WhatsApp link).
    // Wait for the DOM to update before scraping the brief.
    setTimeout(function(){ tryFireLead(1); }, 250);

    function tryFireLead(attempt){
      var waLink = document.querySelector("a[href*='wa.me/917767962441']");
      if (!waLink) {
        // WhatsApp link not yet in DOM — retry once more
        if (attempt < 3) setTimeout(function(){ tryFireLead(attempt + 1); }, 300);
        return;
      }
      var brief = extractBrief(waLink.href);
      if (!brief) return;

      // Idempotency guard — don't fire twice for the same brief
      var briefKey = brief.length + "|" + brief.slice(0, 60);
      if (sentIds.has(briefKey)) return;
      sentIds.add(briefKey);

      var fields = parseFields(brief);

      // Fire email silently — client is now on the success screen
      sendLeadEmail(brief, fields).then(function(ok){
        console.log("[MMM] Lead email " + (ok ? "sent ✓" : "failed ✗") + " — Submit to Team clicked");
      });
    }
  }, true);

  /* ── CSS animation for toast ── */
  var s = document.createElement("style");
  s.textContent = "@keyframes mmmSlideDown{from{transform:translate(-50%,-18px);opacity:0}to{transform:translate(-50%,0);opacity:1}}";
  document.head.appendChild(s);

  console.log("[MMM Configurator] Email capture active \u2714 Endpoint:", FORMSUBMIT_URL);
})();
</script>
