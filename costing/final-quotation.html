<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Final Quotation · Make My Mandir</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/quotation.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <img src="assets/logo.png" alt="Make My Mandir" class="topbar-logo">
      <span class="topbar-title">Costing System</span>
    </div>
    <div class="app-header-right">
      <div class="user-info">
        <div id="userName">—</div>
        <div id="userRole" class="user-role">—</div>
      </div>
      <button class="btn-link" onclick="api.logout()">Sign Out</button>
    </div>
  </header>

  <main class="main-content">
    <a href="#" id="backLink" class="back-link">← Back to Project</a>
    <div id="content">
      <div class="loading">Loading quotation...</div>
    </div>
  </main>

  <!-- Add Line Modal -->
  <div id="addLineModal" class="modal-backdrop" style="display:none;">
    <div class="modal" style="max-width: 560px;">
      <div class="modal-header">
        <h2 id="addLineTitle">Add Line</h2>
        <button class="modal-close" onclick="closeAddLineModal()">×</button>
      </div>
      <div style="padding: 24px;">

        <!-- Material search (shown for material lines) -->
        <div id="materialSearchGroup" style="display:none;">
          <div class="form-group" style="margin-bottom: 16px;">
            <label>Search Material</label>
            <input type="text" id="materialSearch" placeholder="Type to search... e.g. HDHMR, Marble, Acrylic"
                   oninput="filterMaterials()" autocomplete="off"
                   style="width:100%;">
            <div id="materialDropdown" style="display:none; border: 1px solid var(--grey-light); border-top: none; border-radius: 0 0 8px 8px; max-height: 200px; overflow-y: auto; background: white; position: relative; z-index: 10;"></div>
          </div>
          <div id="selectedMaterialDisplay" style="display:none; background: var(--orange-light); border-radius: 8px; padding: 10px 14px; margin-bottom: 16px; font-size: 0.9rem;">
            <strong id="selectedMaterialName"></strong>
            <span id="selectedMaterialCategory" style="color: var(--grey); margin-left: 8px;"></span>
          </div>
          <div class="form-group" id="supplierGroup" style="display:none; margin-bottom: 16px;">
            <label>Supplier</label>
            <select id="supplierSelect" onchange="onSupplierChange()" style="width:100%;">
              <option value="">— Select Supplier —</option>
            </select>
          </div>
        </div>

        <!-- Master search (shown for cnc/decor/hardware/lighting) -->
        <div id="masterSearchGroup" style="display:none;">
          <div class="form-group" style="margin-bottom: 16px;">
            <label id="masterSearchLabel">Search Item</label>
            <input type="text" id="masterSearch" placeholder="Type to search..."
                   oninput="filterMasterItems()" autocomplete="off"
                   style="width:100%;">
            <div id="masterDropdown" style="display:none; border: 1px solid var(--grey-light); border-top: none; border-radius: 0 0 8px 8px; max-height: 200px; overflow-y: auto; background: white; position: relative; z-index: 10;"></div>
          </div>
          <div id="selectedMasterDisplay" style="display:none; background: var(--orange-light); border-radius: 8px; padding: 10px 14px; margin-bottom: 16px; font-size: 0.9rem;">
            <strong id="selectedMasterName"></strong>
          </div>
        </div>

        <!-- Free text (shown for labour/logistics) -->
        <div id="freeTextGroup" style="display:none;">
          <div class="form-group" style="margin-bottom: 16px;">
            <label>Description</label>
            <input type="text" id="freeTextDesc" placeholder="e.g. Installation charges, Transport to Mumbai"
                   style="width:100%;">
          </div>
        </div>

        <!-- Common fields -->
        <div class="form-row form-row-3" style="margin-bottom: 16px;">
          <div class="form-group">
            <label>Qty</label>
            <input type="number" id="lineQty" min="0" step="any" value="1" oninput="calcLineTotal()">
          </div>
          <div class="form-group">
            <label>Unit</label>
            <select id="lineUnit">
              <option value="sqft">sqft</option>
              <option value="cft">cft</option>
              <option value="running_ft">running ft</option>
              <option value="piece">piece</option>
              <option value="lot">lot</option>
              <option value="set">set</option>
            </select>
          </div>
          <div class="form-group">
            <label>Rate (₹)</label>
            <input type="number" id="lineRate" min="0" step="any" oninput="calcLineTotal()">
          </div>
        </div>

        <div style="background: var(--orange-light); border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center;">
          <span style="color: var(--grey); font-size: 0.9rem;">Line Total</span>
          <strong id="lineTotalDisplay" style="font-size: 1.1rem; color: var(--orange);">₹0</strong>
        </div>

        <div class="form-group" style="margin-bottom: 20px;">
          <label>Notes (optional)</label>
          <input type="text" id="lineNotes" placeholder="Any extra details..." style="width:100%;">
        </div>

        <div id="addLineError" class="error-message" style="display:none; margin-bottom: 16px;"></div>

        <div style="display:flex; gap:12px; justify-content:flex-end;">
          <button class="btn-secondary" onclick="closeAddLineModal()">Cancel</button>
          <button class="btn-primary" id="addLineSubmitBtn" onclick="submitAddLine()">Add Line</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/final-quotation.js"></script>
</body>
</html>
