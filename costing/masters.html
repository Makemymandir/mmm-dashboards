<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masters Admin · Make My Mandir</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="app-header">
    <div class="app-header-left">
      <img src="assets/logo.png" alt="Make My Mandir" class="app-logo">
      <span class="app-title">Costing System</span>
    </div>
    <div class="app-header-right">
      <div class="user-info">
        <div id="userName">—</div>
        <div id="userRole" class="user-role">—</div>
      </div>
      <button class="btn-link" onclick="api.logout()">Sign Out</button>
    </div>
  </header>

  <main class="app-main">
    <a href="dashboard.html" id="backLink" class="back-link">← Back to Dashboard</a>
    
    <div class="page-header">
      <h1>Masters Admin</h1>
      <p style="color: var(--grey);">Edit your master data directly. Changes save automatically.</p>
    </div>
    
    <div class="masters-tabs" id="mastersTabs">
      <button class="tab-btn active" data-key="rough_rates">Rough Rates</button>
      <button class="tab-btn" data-key="material">Material Rates</button>
      <button class="tab-btn" data-key="cnc">CNC Designs</button>
      <button class="tab-btn" data-key="decor">Decor</button>
      <button class="tab-btn" data-key="hardware">Hardware</button>
      <button class="tab-btn" data-key="lighting">Lighting</button>
    </div>
    
    <div id="mastersContent" class="masters-content">
      <p style="color: var(--grey);">Loading...</p>
    </div>
  </main>
  
  <script src="js/api.js"></script>
  <script src="js/masters.js"></script>
</body>
</html>
