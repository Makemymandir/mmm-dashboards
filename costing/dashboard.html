<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MMM Costing — Dashboard</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Top bar -->
  <header class="topbar">
    <div class="topbar-left">
      <img src="assets/logo.png" alt="Make My Mandir" class="topbar-logo">
      <span class="topbar-title">Costing System</span>
    </div>
    <div class="app-header-right">
      <a href="masters.html" id="mastersLink" class="btn-link" style="display:none;">Masters</a>
      <div class="user-info">
        <div id="userName">—</div>
        <div id="userRole" class="user-role">—</div>
      </div>
      <button class="btn-link" onclick="api.logout()">Sign Out</button>
    </div>
  </header>

  <main class="main-content">
    <div class="dashboard-header">
      <div>
        <h1>Projects</h1>
        <p id="projectCount" class="dashboard-count">Loading...</p>
      </div>
      <button class="btn-primary" onclick="openNewProjectModal()">+ New Project</button>
    </div>
    
    <!-- Search and filter -->
    <div class="dashboard-controls">
      <input type="text" id="searchInput" class="search-box" placeholder="Search by client, project ID, or location..." oninput="onSearchInput()">
      
      <div class="chip-row">
        <button class="chip chip-active" data-status="all" onclick="setStatusFilter('all')">All</button>
        <button class="chip" data-status="Lead" onclick="setStatusFilter('Lead')">Lead</button>
        <button class="chip" data-status="Active" onclick="setStatusFilter('Active')">Active</button>
        <button class="chip" data-status="Won" onclick="setStatusFilter('Won')">Won</button>
        <button class="chip" data-status="Lost" onclick="setStatusFilter('Lost')">Lost</button>
      </div>
    </div>
    
    <!-- Project list -->
    <div id="projectListContainer">
      <div class="loading">Loading projects...</div>
    </div>
  </main>

 <div id="newProjectModal" class="modal-overlay" style="display:none;">
  <div class="modal" style="max-width:520px;margin:20px auto;">
    <div class="modal-header">
      <h2>New Project</h2>
      <button class="modal-close" onclick="closeNewProjectModal()">×</button>
    </div>
    <div style="padding:20px;display:flex;flex-direction:column;gap:14px;">

      <div class="form-group">
        <label>Client Name *</label>
        <input type="text" id="np_client_name" placeholder="e.g. Sharma Family">
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
        <div class="form-group">
          <label>Contact</label>
          <input type="tel" id="np_contact" placeholder="9800000000">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="np_email" placeholder="name@email.com">
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
        <div class="form-group">
          <label>Location</label>
          <input type="text" id="np_location" placeholder="e.g. Pune, Baner">
        </div>
        <div class="form-group">
          <label>Type of Space</label>
          <select id="np_type">
            <option value="">— Select —</option>
            <option value="Apartment">Apartment</option>
            <option value="Bungalow">Bungalow</option>
            <option value="Villa">Villa</option>
            <option value="Office">Office</option>
            <option value="Showroom">Showroom</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Framework *</label>
        <select id="np_framework">
          <option value="">— Select Framework —</option>
          <option value="Sinhasan">Sinhasan</option>
          <option value="Wall/Floor Mounted">Wall / Floor Mounted</option>
          <option value="Back Panel">Back Panel</option>
          <option value="Open Cabinet">Open Cabinet</option>
          <option value="Cabinet with Door">Cabinet with Door</option>
          <option value="Mandir Room">Mandir Room</option>
        </select>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;">
        <div class="form-group">
          <label>Width (ft)</label>
          <input type="number" id="np_width" step="0.1" placeholder="4">
        </div>
        <div class="form-group">
          <label>Depth (ft)</label>
          <input type="number" id="np_depth" step="0.1" placeholder="2">
        </div>
        <div class="form-group">
          <label>Height (ft)</label>
          <input type="number" id="np_height" step="0.1" placeholder="6">
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
        <div class="form-group">
          <label>Customer Type</label>
          <select id="np_customer_type">
            <option value="B2C">B2C (Retail)</option>
            <option value="B2B">B2B (Trade)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Expected Completion</label>
          <input type="date" id="np_completion">
        </div>
      </div>

      <div class="form-group">
        <label>Notes</label>
        <input type="text" id="np_notes" placeholder="Any extra context...">
      </div>

      <div id="newProjectError" class="error-message" style="display:none;"></div>

      <div style="display:flex;gap:12px;justify-content:flex-end;padding-top:4px;">
        <button class="btn-secondary" onclick="closeNewProjectModal()">Cancel</button>
        <button class="btn-primary" id="createProjectBtn" onclick="createProject()">Create Project</button>
      </div>

    </div>
  </div>
</div>
      
      <form id="newProjectForm" onsubmit="event.preventDefault(); createProject();" style="padding: 24px; display: flex; flex-direction: column; gap: 16px;">
        <div class="form-row">
          <div class="form-group">
            <label for="np_client_name">Client Name *</label>
            <input type="text" id="np_client_name" required>
          </div>
          <div class="form-group">
            <label for="np_contact">Contact (Phone)</label>
            <input type="text" id="np_contact">
          </div>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label for="np_email">Email</label>
            <input type="email" id="np_email">
          </div>
          <div class="form-group">
            <label for="np_location">Location</label>
            <input type="text" id="np_location" placeholder="City / area">
          </div>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label for="np_type">Type of Space</label>
            <select id="np_type">
              <option value="">— Select —</option>
              <option>Apartment</option>
              <option>Bungalow</option>
              <option>Villa</option>
              <option>Office</option>
              <option>Showroom</option>
              <option>Other</option>
            </select>
          </div>
          <div class="form-group">
            <label for="np_framework">Design Framework *</label>
            <select id="np_framework" required>
              <option value="">— Select —</option>
              <option>Sinhasan</option>
              <option>Wall/Floor Mounted</option>
              <option>Back Panel</option>
              <option>Open Cabinet</option>
              <option>Cabinet with Door</option>
              <option>Mandir Room</option>
            </select>
          </div>
        </div>
        
        <div class="form-row form-row-3">
          <div class="form-group">
            <label for="np_width">Width (ft)</label>
            <input type="number" id="np_width" step="0.1" min="0">
          </div>
          <div class="form-group">
            <label for="np_depth">Depth (ft)</label>
            <input type="number" id="np_depth" step="0.1" min="0">
          </div>
          <div class="form-group">
            <label for="np_height">Height (ft)</label>
            <input type="number" id="np_height" step="0.1" min="0">
          </div>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label for="np_completion">Expected Completion</label>
            <input type="date" id="np_completion">
          </div>
          <div class="form-row">
  <div class="form-group">
    <label for="np_completion">Expected Completion</label>
    <input type="date" id="np_completion">
  </div>
  <div class="form-group">
    <label for="np_customer_type">Customer Type</label>
    <select id="np_customer_type">
      <option value="B2C">B2C (Retail — 40% margin)</option>
      <option value="B2B">B2B (Trade — adjust margin manually)</option>
    </select>
  </div>
</div>
<div class="form-row">
  <div class="form-group">
    <label for="np_notes">Notes</label>
    <input type="text" id="np_notes" placeholder="Any extra context...">
  </div>
</div>
        
        <div id="newProjectError" class="error-message" style="display:none;"></div>
        
        <div class="modal-footer">
          <button type="button" class="btn-secondary" onclick="closeNewProjectModal()">Cancel</button>
          <button type="submit" class="btn-primary" id="createProjectBtn">Create Project</button>
        </div>
      </form>
    </div>
  </div>
  
  <script src="js/api.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
