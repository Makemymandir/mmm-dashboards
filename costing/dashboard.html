<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard · Make My Mandir</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <header class="topbar">
    <div class="topbar-left">
      <img src="assets/logo.png" alt="Make My Mandir" class="topbar-logo">
      <span class="topbar-title">Costing System</span>
    </div>
    <div class="app-header-right">
      <div class="user-info">
        <div id="userName">—</div>
        <div id="userRole" class="user-role">—</div>
      </div>
      <div id="adminLinks" style="display:none;">
        <a href="masters.html" class="btn-secondary" style="font-size:0.82rem;padding:6px 12px;">Masters Admin</a>
      </div>
      <button class="btn-link" onclick="api.logout()">Sign Out</button>
    </div>
  </header>

  <main class="main-content">

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="toolbar-left">
        <h1 class="page-title">Projects</h1>
      </div>
      <div class="toolbar-right">
        <input type="text" id="searchInput" class="search-input" placeholder="Search client, city, framework..." oninput="filterProjects()">
        <select id="statusFilter" onchange="filterProjects()" style="padding:8px 12px;border:1.5px solid var(--grey-light);border-radius:8px;font-family:inherit;font-size:0.88rem;">
          <option value="">All Stages</option>
          <optgroup label="── DISCOVER">
            <option value="Inquiry">Inquiry</option>
            <option value="Consultation Done">Consultation Done</option>
            <option value="Design Fee Paid">Design Fee Paid</option>
          </optgroup>
          <optgroup label="── DESIGN">
            <option value="2D Design">2D Design</option>
            <option value="3D Design">3D Design</option>
            <option value="Design Approved">Design Approved</option>
          </optgroup>
          <optgroup label="── DELIVER">
            <option value="In Production">In Production</option>
            <option value="Dispatched">Dispatched</option>
            <option value="Installed">Installed</option>
            <option value="Closed">Closed</option>
          </optgroup>
          <optgroup label="── OTHER">
            <option value="On Hold">On Hold</option>
            <option value="Lost">Lost</option>
          </optgroup>
        </select>
        <button class="btn-primary" onclick="openNewProjectModal()">+ New Project</button>
      </div>
    </div>

    <!-- Stage summary bar -->
    <div id="stageSummary" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;"></div>

    <!-- Projects table -->
    <div id="projectsContainer">
      <div class="loading">Loading projects...</div>
    </div>

  </main>

  <!-- New Project Modal -->
  <div id="newProjectModal" class="modal-overlay" style="display:none;">
    <div class="modal" style="max-width:560px;margin:20px auto;">
      <div class="modal-header">
        <h2>New Project</h2>
        <button class="modal-close" onclick="closeNewProjectModal()">×</button>
      </div>

      <div style="padding:20px;display:flex;flex-direction:column;gap:12px;">

        <!-- Section: Client -->
        <div style="font-size:0.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--orange);font-weight:700;">Client Details</div>

        <div class="form-group">
          <label>Client Name *</label>
          <input type="text" id="np_client_name" placeholder="e.g. Sharma Family">
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div class="form-group">
            <label>WhatsApp Number *</label>
            <input type="tel" id="np_contact" placeholder="9800000000" maxlength="10">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="np_email" placeholder="name@email.com">
          </div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div class="form-group">
            <label>City *</label>
            <input type="text" id="np_location" placeholder="e.g. Pune, Baner">
          </div>
          <div class="form-group">
            <label>Source</label>
            <select id="np_source">
              <option value="">— How did they find you? —</option>
              <option value="Configurator">Configurator Form</option>
              <option value="Walk-in">Walk-in</option>
              <option value="WhatsApp">WhatsApp Direct</option>
              <option value="Referral">Referral</option>
              <option value="Instagram">Instagram</option>
              <option value="Google">Google Search</option>
              <option value="Other">Other</option>
            </select>
          </div>
        </div>

        <!-- Section: Mandir -->
        <div style="font-size:0.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--orange);font-weight:700;margin-top:4px;">Mandir Details</div>

        <div class="form-group">
          <label>Framework *</label>
          <select id="np_framework">
            <option value="">— Select Framework —</option>
            <option value="Sinhasan">Sinhasan</option>
            <option value="Wall/Floor Mounted">Wall / Floor Mounted</option>
            <option value="Back Panel">Back Panel</option>
            <option value="Open Cabinet">Open Cabinet</option>
            <option value="Cabinet with Door">Cabinet with Door</option>
            <option value="Mandir Room">Mandir Room</option>
            <option value="Outdoor Mandir">Outdoor Mandir</option>
          </select>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;">
          <div class="form-group">
            <label>Width (ft)</label>
            <input type="number" id="np_width" step="0.5" placeholder="4">
          </div>
          <div class="form-group">
            <label>Depth (ft)</label>
            <input type="number" id="np_depth" step="0.5" placeholder="2">
          </div>
          <div class="form-group">
            <label>Height (ft)</label>
            <input type="number" id="np_height" step="0.5" placeholder="6">
          </div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div class="form-group">
            <label>Budget Range</label>
            <select id="np_budget">
              <option value="">— Select —</option>
              <option value="Under ₹1 Lakh">Under ₹1 Lakh</option>
              <option value="₹1 – 2 Lakh">₹1 – 2 Lakh</option>
              <option value="₹2 – 5 Lakh">₹2 – 5 Lakh</option>
              <option value="₹5 – 10 Lakh">₹5 – 10 Lakh</option>
              <option value="₹10 – 25 Lakh">₹10 – 25 Lakh</option>
              <option value="₹25 Lakh+">₹25 Lakh+</option>
              <option value="Flexible">Flexible</option>
            </select>
          </div>
          <div class="form-group">
            <label>Timeline</label>
            <select id="np_timeline">
              <option value="">— Select —</option>
              <option value="ASAP (within 30 days)">ASAP (within 30 days)</option>
              <option value="1 – 2 months">1 – 2 months</option>
              <option value="3 – 6 months">3 – 6 months</option>
              <option value="Just exploring">Just exploring</option>
            </select>
          </div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div class="form-group">
            <label>Customer Type</label>
            <select id="np_customer_type">
              <option value="B2C">B2C (Retail)</option>
              <option value="B2B">B2B (Trade)</option>
            </select>
          </div>
          <div class="form-group">
            <label>Design Fee</label>
            <select id="np_design_fee_status">
              <option value="Not Paid">Not Paid</option>
              <option value="Paid">Paid</option>
            </select>
          </div>
        </div>

        <!-- Section: Consultation Notes -->
        <div style="font-size:0.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--orange);font-weight:700;margin-top:4px;">Consultation Notes</div>

        <div class="form-group">
          <label>Sales Summary <span style="color:var(--grey);font-weight:400;font-size:0.8rem;">(what did client say on the call?)</span></label>
          <textarea id="np_consultation_notes" rows="3" placeholder="e.g. Client wants Cabinet with Door, modern style, Ganesh + Laxmi, prefers white marble, budget around 3L, needs by Diwali..."></textarea>
        </div>

        <div id="newProjectError" class="error-message" style="display:none;"></div>

        <div style="display:flex;gap:12px;justify-content:flex-end;padding-top:4px;">
          <button class="btn-secondary" onclick="closeNewProjectModal()">Cancel</button>
          <button class="btn-primary" id="createProjectBtn" onclick="createProject()">Create Project</button>
        </div>

      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
